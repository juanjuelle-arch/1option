{% extends "base.html" %}
{% block title %}Sign Up — 1.OPTION{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">1.OPTION</div>
    <h1 class="auth-title">Create your account</h1>
    <p class="auth-sub">Start with a free account, upgrade anytime</p>

    <form method="POST" class="auth-form">
      <div class="form-group">
        <label>Full Name</label>
        <input type="text" name="name" required placeholder="Juan Doe" />
      </div>
      <div class="form-group">
        <label>Email</label>
        <input type="email" name="email" required placeholder="you@example.com" />
      </div>
      <div class="form-group">
        <label>Password</label>
        <input type="password" name="password" required placeholder="Min. 6 characters" />
      </div>
      <button type="submit" class="btn btn-primary btn-full">Create Account</button>
    </form>

    <p class="auth-switch">Already have an account? <a href="{{ url_for('login') }}">Log in</a></p>
  </div>
</div>
{% endblock %}
