{% extends "base.html" %}
{% block title %}404 — Page Not Found{% endblock %}
{% block content %}
<div class="auth-page">
  <div class="auth-card" style="text-align:center;">
    <div style="font-size:64px; margin-bottom:16px;">404</div>
    <h1 class="auth-title">Page Not Found</h1>
    <p class="auth-sub">The page you're looking for doesn't exist or has been moved.</p>
    <a href="{{ url_for('index') }}" class="btn btn-primary" style="margin-top:24px;">Go Home</a>
  </div>
</div>
{% endblock %}
